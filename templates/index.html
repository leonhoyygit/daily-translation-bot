<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baby Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- Header with Language Switcher -->
        <header>
            <div class="header-content">
                <h1 id="app-title" data-i18n="app_title">Baby Tracker</h1>
                <div class="lang-switcher">
                    <button onclick="setLanguage('en')" id="btn-en">EN</button>
                    <button onclick="setLanguage('id')" id="btn-id">ID</button>
                    <button onclick="setLanguage('zh')" id="btn-zh">繁</button>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- Tab 1: Daily Tracker -->
            <section id="tab-daily" class="tab-content active">
                <div class="profile-section">
                    <div class="baby-photo">
                        <!-- User's daughter photo -->
                        <img src="/static/baby_photo.jpg" alt="Daughter" id="baby-img" onerror="this.src='/static/baby_placeholder.png'">
                    </div>
                    <div class="daily-tasks">
                        <div class="tasks-header">
                            <h3 data-i18n="daily_tasks">Daily Tasks</h3>
                            <button class="btn-add-task" onclick="showAddTask()">+</button>
                        </div>
                        <ul id="task-list"></ul>
                    </div>
                </div>

                <div class="input-grid">
                    <!-- Sleep -->
                    <div class="card" onclick="openForm('sleep')">
                        <span class="icon">😴</span>
                        <span data-i18n="sleep">Sleep</span>
                    </div>
                    <!-- Diaper -->
                    <div class="card" onclick="openForm('diaper')">
                        <span class="icon">👶</span>
                        <span data-i18n="diaper">Diaper</span>
                    </div>
                    <!-- Feeding -->
                    <div class="card" onclick="openForm('feeding')">
                        <span class="icon">🍼</span>
                        <span data-i18n="feeding">Feeding</span>
                    </div>
                    <!-- Solid Food -->
                    <div class="card" onclick="openForm('food')">
                        <span class="icon">🥣</span>
                        <span data-i18n="food">Solid Food</span>
                    </div>
                    <!-- Care/Love -->
                    <div class="card" onclick="openForm('care')">
                        <span class="icon">❤️</span>
                        <span data-i18n="care">Care & Love</span>
                    </div>
                </div>

                <!-- Daily Activity Feed -->
                <div class="activity-feed-section">
                    <h3 data-i18n="days_activity">Today's Activities</h3>
                    <div id="daily-activity-list" class="records-list">
                        <!-- Real-time activities will appear here -->
                    </div>
                </div>
            </section>

            <!-- Tab 2: Calendar -->
            <section id="tab-calendar" class="tab-content">
                <div id="calendar-container" class="card">
                    <div class="calendar-nav">
                        <button onclick="prevMonth()">&lt;</button>
                        <h3 id="current-month-year"></h3>
                        <button onclick="nextMonth()">&gt;</button>
                    </div>
                    <div id="calendar-grid"></div>
                </div>
                <div id="calendar-records-header">
                    <h3 id="selected-date-label"></h3>
                </div>
                <div id="calendar-records" class="records-list"></div>
            </section>

            <!-- Tab 3: Growth -->
            <section id="tab-growth" class="tab-content">
                <div class="growth-form card">
                    <h3 data-i18n="log_growth">Log Monthly Growth</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label data-i18n="weight">Weight (kg)</label>
                            <input type="number" step="0.01" id="growth-weight">
                        </div>
                        <div class="form-group">
                            <label data-i18n="height">Height (cm)</label>
                            <input type="number" step="0.1" id="growth-height">
                        </div>
                        <div class="form-group">
                            <label data-i18n="head">Head Circ. (cm)</label>
                            <input type="number" step="0.1" id="growth-head">
                        </div>
                    </div>
                    <button class="btn-save" onclick="saveGrowth()" data-i18n="save">Save</button>
                </div>
                
                <div class="charts-container">
                    <div class="card chart-card">
                        <h4 data-i18n="weight_chart">Weight Trend</h4>
                        <canvas id="weightChart"></canvas>
                    </div>
                    <div class="card chart-card">
                        <h4 data-i18n="height_chart">Height Trend</h4>
                        <canvas id="heightChart"></canvas>
                    </div>
                    <div class="card chart-card">
                        <h4 data-i18n="head_chart">Head Circ. Trend</h4>
                        <canvas id="headChart"></canvas>
                    </div>
                </div>
                
                <div id="growth-history" class="records-list"></div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button onclick="switchTab('daily')" class="nav-item active" id="nav-daily">
                <span class="nav-icon">📝</span>
                <span class="nav-label" data-i18n="tab_daily">Daily</span>
            </button>
            <button onclick="switchTab('calendar')" class="nav-item" id="nav-calendar">
                <span class="nav-icon">📅</span>
                <span class="nav-label" data-i18n="tab_calendar">Calendar</span>
            </button>
            <button onclick="switchTab('growth')" class="nav-item" id="nav-growth">
                <span class="nav-icon">📈</span>
                <span class="nav-label" data-i18n="tab_growth">Growth</span>
            </button>
        </nav>

        <!-- Modal for Forms -->
        <div id="form-modal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeForm()">&times;</span>
                <div id="modal-body"></div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
