<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Andrea's Baby Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- Profile & Language Switcher Header -->
        <header>
            <div class="header-top">
                <div class="profile-container">
                    <div class="baby-photo">
                        <img src="/static/baby_photo.jpg" alt="Andrea" id="baby-img" onerror="this.src='/static/baby_placeholder.png'">
                    </div>
                    <div class="baby-info">
                        <h1 id="baby-name">Andrea</h1>
                        <p id="baby-quote" data-i18n="baby_quote">Growing with love every day! ❤️</p>
                    </div>
                </div>
                <div class="lang-switcher">
                    <button onclick="setLanguage('en')" id="btn-en">EN</button>
                    <button onclick="setLanguage('id')" id="btn-id">ID</button>
                    <button onclick="setLanguage('zh')" id="btn-zh">繁</button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main id="main-content">
            <!-- Tab 1: Daily Tracker -->
            <section id="tab-daily" class="tab-content active">
                <div class="input-grid">
                    <div class="card stylish-card" onclick="openForm('sleep')">
                        <span class="icon">😴</span>
                        <span data-i18n="sleep">Sleep</span>
                    </div>
                    <div class="card stylish-card" onclick="openForm('diaper')">
                        <span class="icon">👶</span>
                        <span data-i18n="diaper">Diaper</span>
                    </div>
                    <div class="card stylish-card" onclick="openForm('feeding')">
                        <span class="icon">🍼</span>
                        <span data-i18n="feeding">Feeding</span>
                    </div>
                    <div class="card stylish-card" onclick="openForm('food')">
                        <span class="icon">🥣</span>
                        <span data-i18n="food">Solid Food</span>
                    </div>
                    <div class="card stylish-card" onclick="openForm('care')">
                        <span class="icon">❤️</span>
                        <span data-i18n="care">Care & Love</span>
                    </div>
                </div>
                
                <div class="recent-activity-preview">
                    <h3 data-i18n="latest_logs">Latest Logs</h3>
                    <div id="latest-logs-list" class="mini-timeline"></div>
                </div>
            </section>

            <!-- Tab 2: Calendar & Activities -->
            <section id="tab-calendar" class="tab-content">
                <div class="sub-tab-nav">
                    <button onclick="switchSubTab('cal-view')" id="btn-cal-view" class="active" data-i18n="calendar">Calendar</button>
                    <button onclick="switchSubTab('act-view')" id="btn-act-view" data-i18n="activities">Activities</button>
                </div>

                <div id="sub-tab-cal-view" class="sub-tab-content active">
                    <div id="calendar-container" class="card cartoon-card">
                        <div class="calendar-nav">
                            <button onclick="prevMonth()">🍞</button>
                            <h3 id="current-month-year"></h3>
                            <button onclick="nextMonth()">🍞</button>
                        </div>
                        <div id="calendar-grid"></div>
                    </div>
                </div>

                <div id="sub-tab-act-view" class="sub-tab-content">
                    <div class="timeline-container card cartoon-card">
                        <h3 id="selected-date-label"></h3>
                        <div id="timeline-list" class="timeline">
                            <!-- Chronological timeline here -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- Tab 3: Growth -->
            <section id="tab-growth" class="tab-content">
                <div class="growth-form card cartoon-card">
                    <h3 data-i18n="log_growth">Log Monthly Growth</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label data-i18n="weight">Weight (kg)</label>
                            <input type="number" step="0.01" id="growth-weight">
                        </div>
                        <div class="form-group">
                            <label data-i18n="height">Height (cm)</label>
                            <input type="number" step="0.1" id="growth-height">
                        </div>
                        <div class="form-group">
                            <label data-i18n="head">Head Circ. (cm)</label>
                            <input type="number" step="0.1" id="growth-head">
                        </div>
                    </div>
                    <button class="btn-save" onclick="saveGrowth()" data-i18n="save">Save</button>
                </div>
                
                <div class="charts-container">
                    <div class="card chart-card">
                        <h4 data-i18n="weight_chart">Weight Trend</h4>
                        <canvas id="weightChart"></canvas>
                    </div>
                    <div class="card chart-card">
                        <h4 data-i18n="height_chart">Height Trend</h4>
                        <canvas id="heightChart"></canvas>
                    </div>
                    <div class="card chart-card">
                        <h4 data-i18n="head_chart">Head Circ. Trend</h4>
                        <canvas id="headChart"></canvas>
                    </div>
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button onclick="switchTab('daily')" class="nav-item active" id="nav-daily">
                <span class="nav-icon">⭐</span>
                <span class="nav-label" data-i18n="tab_daily">Daily</span>
            </button>
            <button onclick="switchTab('calendar')" class="nav-item" id="nav-calendar">
                <span class="nav-icon">📅</span>
                <span class="nav-label" data-i18n="tab_calendar">Calendar</span>
            </button>
            <button onclick="switchTab('growth')" class="nav-item" id="nav-growth">
                <span class="nav-icon">📈</span>
                <span class="nav-label" data-i18n="tab_growth">Growth</span>
            </button>
        </nav>

        <!-- Modal -->
        <div id="form-modal" class="modal">
            <div class="modal-content cartoon-modal">
                <span class="close" onclick="closeForm()">&times;</span>
                <div id="modal-body"></div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
