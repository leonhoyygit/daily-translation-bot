<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Andrea's Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- Modern Compressed Header -->
        <header class="premium-header">
            <div class="profile-mini">
                <div class="photo-wrapper">
                    <img src="/static/baby_photo.jpg" alt="Andrea" id="baby-img">
                </div>
                <div class="info-mini">
                    <h1 id="baby-name">Andrea</h1>
                    <p id="baby-quote" data-i18n="baby_quote">Growing with love ❤️</p>
                </div>
            </div>
            <div class="lang-pill">
                <button onclick="setLanguage('en')" id="btn-en">EN</button>
                <button onclick="setLanguage('id')" id="btn-id">ID</button>
                <button onclick="setLanguage('zh')" id="btn-zh">繁</button>
            </div>
        </header>

        <main id="main-content">
            <!-- Tab 1: Daily (Strict Isolation) -->
            <section id="tab-daily" class="tab-content active">
                <!-- Redesigned Daily Overview: Wide Banners -->
                <div class="overview-banners" id="daily-banners">
                    <div class="date-header-mini">
                        <span id="display-date">May 15, 2026</span>
                    </div>

                    <!-- Meal Plan Wide Card -->
                    <div class="banner-card meal-banner" onclick="openMealPlan()">
                        <div class="banner-content">
                            <div class="banner-icon">🍱</div>
                            <div class="banner-text">
                                <label data-i18n="meal_plan">Meal Plan</label>
                                <span id="meal-preview" data-i18n="update_now">Update today's menu</span>
                            </div>
                        </div>
                        <button class="edit-btn">✏️</button>
                    </div>

                    <!-- Daily Goals Wide Card -->
                    <div class="banner-card task-banner" onclick="openTaskList()">
                        <div class="banner-content">
                            <div class="banner-icon">🎯</div>
                            <div class="banner-text">
                                <label data-i18n="daily_goals">Daily Goals</label>
                                <div class="progress-container">
                                    <div class="progress-bar" id="task-progress" style="width: 0%"></div>
                                </div>
                                <span id="task-preview" class="progress-text">0/0 completed</span>
                            </div>
                        </div>
                        <button class="edit-btn">✏️</button>
                    </div>

                    <!-- Birthday Badge (Optional) -->
                    <div id="birthday-badge" class="birthday-badge banner-badge" style="display: none;">
                        <span class="icon">🎂</span>
                        <span data-i18n="birthday">Happy Birthday Andrea!</span>
                    </div>
                </div>

                <div class="input-grid-premium">
                    <div class="action-card" onclick="openForm('sleep')">
                        <div class="card-icon sleep-bg">😴</div>
                        <span data-i18n="sleep">Sleep</span>
                    </div>
                    <div class="action-card" onclick="openForm('diaper')">
                        <div class="card-icon diaper-bg">👶</div>
                        <span data-i18n="diaper">Diaper</span>
                    </div>
                    <div class="action-card" onclick="openForm('feeding')">
                        <div class="card-icon feeding-bg">🍼</div>
                        <span data-i18n="feeding">Feeding</span>
                    </div>
                    <div class="action-card" onclick="openForm('food')">
                        <div class="card-icon food-bg">🥣</div>
                        <span data-i18n="food">Solid Food</span>
                    </div>
                    <div class="action-card" onclick="openForm('care')">
                        <div class="card-icon care-bg">❤️</div>
                        <span data-i18n="care">Care & Love</span>
                    </div>
                </div>
            </section>

            <!-- Tab 2: Activities (Timeline) -->
            <section id="tab-activities" class="tab-content">
                <div class="date-header-card">
                    <h2 id="activity-date-label">Today</h2>
                </div>
                <div id="timeline-list" class="timeline-premium">
                    <!-- Chronological entries -->
                </div>
            </section>

            <!-- Tab 3: Calendar (Navigation) -->
            <section id="tab-calendar" class="tab-content">
                <div class="calendar-card-premium">
                    <div class="cal-header">
                        <button class="cal-nav-btn" onclick="prevMonth()">&lt;</button>
                        <h3 id="current-month-year"></h3>
                        <button class="cal-nav-btn" onclick="nextMonth()">&gt;</button>
                    </div>
                    <div id="calendar-grid" class="modern-grid"></div>
                </div>
            </section>

            <!-- Tab 4: Growth -->
            <section id="tab-growth" class="tab-content">
                <div class="growth-input-card">
                    <h3 data-i18n="log_growth">Growth Metrics</h3>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label data-i18n="calendar">Calendar</label>
                        <input type="date" id="growth-date">
                    </div>
                    <div class="input-row">
                        <div class="field-pill">
                            <label data-i18n="weight">W (kg)</label>
                            <input type="number" step="0.01" id="growth-weight">
                        </div>
                        <div class="field-pill">
                            <label data-i18n="height">H (cm)</label>
                            <input type="number" step="0.1" id="growth-height">
                        </div>
                        <div class="field-pill">
                            <label data-i18n="head">Head (cm)</label>
                            <input type="number" step="0.1" id="growth-head">
                        </div>
                    </div>
                    <button class="btn-primary-pill" onclick="saveGrowth()" data-i18n="save">Save Update</button>
                </div>
                
                <div class="charts-stack">
                    <div class="chart-box">
                        <h4 data-i18n="weight_chart">Weight Trend</h4>
                        <canvas id="weightChart"></canvas>
                    </div>
                    <div class="chart-box">
                        <h4 data-i18n="height_chart">Height Trend</h4>
                        <canvas id="heightChart"></canvas>
                    </div>
                    <div class="chart-box">
                        <h4 data-i18n="head_chart">Head Circumference</h4>
                        <canvas id="headChart"></canvas>
                    </div>
                </div>
            </section>
        </main>

        <!-- Bottom Navigation Menu -->
        <nav class="premium-nav">
            <button onclick="switchTab('daily')" class="nav-btn active" id="nav-daily">
                <span class="icon-m">✨</span>
                <span data-i18n="tab_daily">Daily</span>
            </button>
            <button onclick="switchTab('activities')" class="nav-btn" id="nav-activities">
                <span class="icon-m">📜</span>
                <span data-i18n="activities">Activities</span>
            </button>
            <button onclick="switchTab('calendar')" class="nav-btn" id="nav-calendar">
                <span class="icon-m">📅</span>
                <span data-i18n="calendar">Calendar</span>
            </button>
            <button onclick="switchTab('growth')" class="nav-btn" id="nav-growth">
                <span class="icon-m">📈</span>
                <span data-i18n="tab_growth">Growth</span>
            </button>
        </nav>

        <!-- Dynamic Modal -->
        <div id="form-modal" class="modal-overlay">
            <div class="modal-sheet">
                <div class="sheet-handle"></div>
                <button class="sheet-close" onclick="closeForm()">&times;</button>
                <div id="modal-body" class="sheet-body"></div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
